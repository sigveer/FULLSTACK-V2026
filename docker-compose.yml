services:
  mysql:
    image: mysql:8.4
    container_name: ik_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ik_system
      MYSQL_USER: ik_user
      MYSQL_PASSWORD: ik_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uik_user", "-pik_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: ik_backend
    working_dir: /workspace/backend
    command: mvn -f ik-common/pom.xml spring-boot:run
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ik_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ik_user
      DB_PASSWORD: ik_password
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/workspace/backend
      - maven_cache:/root/.m2
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    container_name: ik_frontend
    working_dir: /workspace/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/workspace/frontend
      - frontend_node_modules:/workspace/frontend/node_modules
    depends_on:
      - backend

volumes:
  mysql_data:
  maven_cache:
  frontend_node_modules:
