services:
  mysql:
    image: mysql:8.4
    container_name: ik_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ik_system
      MYSQL_USER: ik_user
      MYSQL_PASSWORD: ik_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uik_user", "-pik_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ik-mat:
    build:
      context: ./backend
      args:
        MODULE: ik-mat
    container_name: ik_mat
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ik_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ik_user
      DB_PASSWORD: ik_password
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy

  ik-alkohol:
    build:
      context: ./backend
      args:
        MODULE: ik-alkohol
    container_name: ik_alkohol
    environment:
      DB_URL: jdbc:mysql://mysql:3306/ik_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ik_user
      DB_PASSWORD: ik_password
    ports:
      - "8082:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: ik_frontend
    ports:
      - "80:80"
    depends_on:
      - ik-mat
      - ik-alkohol

volumes:
  mysql_data:
