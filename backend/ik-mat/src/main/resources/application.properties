spring.application.name=ik-mat

# MySQL configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ik_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:ik_user}
spring.datasource.password=${DB_PASSWORD:ik_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Swagger - UI served by nginx, only expose api-docs here
springdoc.swagger-ui.enabled=false
springdoc.api-docs.path=/v3/api-docs
