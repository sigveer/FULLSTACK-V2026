<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IK System - API Documentation</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
        SwaggerUIBundle({
            urls: [
                { url: "/api/mat/v3/api-docs", name: "IK-Mat (Food Compliance)" },
                { url: "/api/alkohol/v3/api-docs", name: "IK-Alkohol (Alcohol Compliance)" }
            ],
            dom_id: "#swagger-ui",
            deepLinking: true,
            presets: [SwaggerUIBundle.presets.apis]
        });
    </script>
</body>
</html>
